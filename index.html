<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>New Palace Provision & General Store</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f5f5f0;
      color: #333;
      padding-bottom: 100px;
    }

    header {
      background: #2e7d32;
      color: white;
      padding: 16px 20px;
      text-align: center;
    }
    header h1 { font-size: 1.4rem; }
    header p  { font-size: 0.85rem; opacity: 0.85; margin-top: 4px; }
    header .store-phone { font-size: 0.9rem; margin-top: 6px; opacity: 1; font-weight: 600; letter-spacing: 0.5px; }

    /* 2-column portrait grid */
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      padding: 16px;
      max-width: 600px;
      margin: 0 auto;
    }

    .card {
      background: white;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      transition: transform 0.15s, box-shadow 0.15s;
      cursor: pointer;
      user-select: none;
      display: flex;
      flex-direction: column;
    }
    .card:hover { transform: translateY(-3px); box-shadow: 0 4px 16px rgba(0,0,0,0.12); }
    .card:active { transform: scale(0.97); }
    .card.selected { outline: 3px solid #2e7d32; }

    .card img {
      width: 100%;
      height: 160px;
      object-fit: cover;
    }

    .card-body {
      padding: 10px 10px 12px;
      display: flex;
      flex-direction: column;
      flex: 1;
    }
    .card-body h3 { font-size: 0.8rem; margin-bottom: 4px; line-height: 1.3; }

    .measurement { font-size: 0.72rem; color: #888; margin-bottom: 6px; }

    .pricing {
      display: flex;
      align-items: center;
      gap: 5px;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }
    .mrp-strike { font-size: 0.75rem; color: #aaa; text-decoration: line-through; }
    .sale-price  { font-size: 0.9rem; color: #2e7d32; font-weight: 700; }

    /* Checkbox row */
    .add-row {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.8rem;
      margin-top: auto;
    }
    .add-row input[type="checkbox"] {
      width: 16px; height: 16px;
      accent-color: #2e7d32;
      cursor: pointer;
      flex-shrink: 0;
    }

    /* Quantity stepper — hidden until checked */
    .qty-stepper {
      display: none;
      align-items: center;
      gap: 0;
      margin-top: 8px;
      border: 1.5px solid #2e7d32;
      border-radius: 8px;
      overflow: hidden;
      width: 100%;
    }
    .qty-stepper.visible { display: flex; }

    .qty-btn {
      background: #2e7d32;
      color: white;
      border: none;
      width: 34px;
      height: 32px;
      font-size: 1.1rem;
      cursor: pointer;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s;
    }
    .qty-btn:hover { background: #1b5e20; }
    .qty-num {
      flex: 1;
      text-align: center;
      font-size: 0.9rem;
      font-weight: 700;
      color: #2e7d32;
    }

    /* Floating cart bubble */
    #cart-bubble {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      background: #f9a825;
      color: #333;
      border-radius: 50px;
      padding: 10px 26px;
      text-align: center;
      box-shadow: 0 4px 18px rgba(0,0,0,0.22);
      display: none;
      z-index: 50;
      min-width: 220px;
      cursor: pointer;
      transition: background 0.3s, color 0.3s, transform 0.15s;
    }
    #cart-bubble:hover  { transform: translateX(-50%) scale(1.04); }
    #cart-bubble:active { transform: translateX(-50%) scale(0.97); }
    #cart-bubble.free-delivery { background: #2e7d32; color: white; }
    #cart-bubble .bubble-tap    { font-size: 0.7rem; font-weight: 600; letter-spacing: 0.5px; opacity: 0.8; margin-bottom: 1px; }
    #cart-bubble .bubble-amount { font-size: 0.95rem; font-weight: 700; }
    #cart-bubble .bubble-note   { font-size: 0.72rem; margin-top: 2px; opacity: 0.85; }

    /* Footer */
    .footer {
      text-align: center;
      padding: 12px 24px 80px;
      max-width: 600px;
      margin: 0 auto;
    }
    #selected-count { font-size: 0.9rem; color: #555; }

    /* Modal */
    .modal-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }
    .modal-overlay.open { display: flex; }

    .modal {
      background: white;
      border-radius: 16px;
      padding: 28px 24px;
      width: 90%;
      max-width: 420px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.2);
    }
    .modal h2 { font-size: 1.1rem; margin-bottom: 6px; color: #2e7d32; }
    .modal p  { font-size: 0.85rem; color: #777; margin-bottom: 20px; }

    .modal label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      margin-bottom: 4px;
      color: #444;
    }
    .modal input, .modal textarea {
      width: 100%;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 0.9rem;
      margin-bottom: 14px;
      outline: none;
      transition: border 0.2s;
    }
    .modal input:focus, .modal textarea:focus { border-color: #2e7d32; }
    .modal textarea { resize: vertical; min-height: 70px; }

    .modal-actions { display: flex; gap: 10px; justify-content: flex-end; }
    .btn-cancel {
      background: #eee; border: none; padding: 10px 20px;
      border-radius: 8px; cursor: pointer; font-size: 0.9rem;
    }
    .btn-confirm {
      background: #25D366; color: white; border: none;
      padding: 10px 20px; border-radius: 8px;
      cursor: pointer; font-size: 0.9rem; font-weight: 600;
    }
    .btn-confirm:hover { background: #1ebe5d; }
  </style>
</head>
<body>

<header>
  <h1>🛒 New Palace Provision & General Store</h1>
  <p>Sector 30C, Chandigarh — Order via WhatsApp</p>
  <p class="store-phone">📞 9876364002</p>
</header>

<div class="grid" id="product-grid"></div>

<div class="footer">
  <p id="selected-count">0 items selected</p>
</div>

<!-- Floating cart bubble -->
<div id="cart-bubble">
  <div class="bubble-tap">TAP TO ORDER →</div>
  <div class="bubble-amount" id="bubble-amount">₹0</div>
  <div class="bubble-note"   id="bubble-note"></div>
</div>

<!-- Address / Phone Modal -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <h2>Delivery Details</h2>
    <p>We need your details so our delivery boy can reach you.</p>

    <label for="input-name">Your Name</label>
    <input type="text" id="input-name" placeholder="e.g. Mohit" />

    <label for="input-address">Delivery Address</label>
    <textarea id="input-address" placeholder="House no., Street, Sector, City"></textarea>

    <label for="input-phone">Phone Number</label>
    <input type="tel" id="input-phone" placeholder="e.g. 9876543210" maxlength="10" />

    <div class="modal-actions">
      <button class="btn-cancel" id="modal-cancel">Cancel</button>
      <button class="btn-confirm" id="modal-confirm">Send Order on WhatsApp</button>
    </div>
  </div>
</div>

<script>
  const PHONE = "919168081609";
  const FREE_DELIVERY_THRESHOLD = 500;
  const DELIVERY_CHARGE = 50;

  // Image extension map — add entries if you add new items
  const IMG_EXT = { 1:"avif", 2:"png", 3:"avif", 4:"png", 5:"png", 6:"png" };

  function parseCSV(text) {
    const lines = text.split("\n").map(l => l.trim()).filter(l => l);
    // skip header row, skip empty/junk rows (first col must be a number)
    return lines.slice(1)
      .map(line => {
        const cols = line.split(",");
        const id = parseInt(cols[0]);
        if (isNaN(id)) return null;
        const name  = (cols[1] || "").trim();
        const mrp   = parseFloat(cols[2]) || 0;
        const sale  = parseFloat(cols[3]) || mrp;
        const grams = parseFloat(cols[4]) || 0;
        const ml    = parseFloat(cols[5]) || 0;
        const pcs   = parseFloat(cols[6]) || 0;
        const ext   = IMG_EXT[id] || "png";
        return { id, name, mrp, sale,
          ...(grams ? { grams } : {}),
          ...(ml    ? { ml }    : {}),
          ...(pcs   ? { pcs }   : {}),
          ext };
      })
      .filter(p => p && p.name);
  }

  fetch("Items list.csv")
    .then(r => r.text())
    .then(text => initApp(parseCSV(text)))
    .catch(() => { document.getElementById("product-grid").innerHTML = "<p style='padding:24px;color:red'>Could not load items. Make sure Items list.csv is in the same folder.</p>"; });

  function initApp(products) {

  // qty[i] = quantity selected for product i (0 = not in cart)
  const qty = new Array(products.length).fill(0);

  function getMeasurement(p) {
    if (p.grams) return `${p.grams}gm`;
    if (p.ml)    return `${p.ml}ml`;
    if (p.pcs)   return `${p.pcs} pcs`;
    return "";
  }

  function totalSale() { return products.reduce((s, p, i) => s + p.sale * qty[i], 0); }
  function totalMRP()  { return products.reduce((s, p, i) => s + p.mrp  * qty[i], 0); }
  function totalItems(){ return qty.reduce((s, q) => s + q, 0); }

  const grid      = document.getElementById("product-grid");
  const countEl   = document.getElementById("selected-count");
  const bubble    = document.getElementById("cart-bubble");
  const bubbleAmt = document.getElementById("bubble-amount");
  const bubbleNote= document.getElementById("bubble-note");
  const overlay   = document.getElementById("modal-overlay");

  function updateUI() {
    const n    = totalItems();
    const sale = totalSale();

    countEl.textContent = `${n} item${n !== 1 ? "s" : ""} in cart`;

    // floating bubble
    if (n === 0) {
      bubble.style.display = "none";
    } else {
      bubble.style.display = "block";
      bubbleAmt.textContent = `₹${sale}`;
      if (sale >= FREE_DELIVERY_THRESHOLD) {
        bubble.classList.add("free-delivery");
        bubbleNote.textContent = "Free delivery >₹500 !!!";
      } else {
        bubble.classList.remove("free-delivery");
        bubbleNote.textContent = `+ delivery charges (below ₹500)`;
      }
    }
  }

  // Build cards
  products.forEach((p, i) => {
    const hasSale = p.sale < p.mrp;
    const m = getMeasurement(p);

    const card = document.createElement("div");
    card.className = "card";
    card.innerHTML = `
      <img src="Item images/${p.id}.${p.ext}" alt="${p.name}" loading="lazy" />
      <div class="card-body">
        <h3>${p.name}</h3>
        ${m ? `<div class="measurement">${m}</div>` : ""}
        <div class="pricing">
          ${hasSale ? `<span class="mrp-strike">₹${p.mrp}</span>` : ""}
          <span class="sale-price">₹${p.sale}</span>
        </div>
        <div class="add-row">
          <input type="checkbox" id="cb-${i}" />
          <label for="cb-${i}" style="cursor:pointer;font-size:0.8rem;">Add to order</label>
        </div>
        <div class="qty-stepper" id="stepper-${i}">
          <button class="qty-btn" id="minus-${i}">−</button>
          <span class="qty-num" id="qnum-${i}">1</span>
          <button class="qty-btn" id="plus-${i}">+</button>
        </div>
      </div>
    `;

    grid.appendChild(card);

    const cb      = document.getElementById(`cb-${i}`);
    const stepper = document.getElementById(`stepper-${i}`);
    const qnum    = document.getElementById(`qnum-${i}`);
    const minusBtn= document.getElementById(`minus-${i}`);
    const plusBtn = document.getElementById(`plus-${i}`);

    cb.addEventListener("change", () => {
      if (cb.checked) {
        qty[i] = 1;
        qnum.textContent = 1;
        stepper.classList.add("visible");
        card.classList.add("selected");
      } else {
        qty[i] = 0;
        stepper.classList.remove("visible");
        card.classList.remove("selected");
      }
      updateUI();
    });

    plusBtn.addEventListener("click", (e) => {
      e.stopPropagation();
      qty[i]++;
      qnum.textContent = qty[i];
      updateUI();
    });

    minusBtn.addEventListener("click", (e) => {
      e.stopPropagation();
      if (qty[i] > 1) {
        qty[i]--;
        qnum.textContent = qty[i];
      } else {
        // deselect
        qty[i] = 0;
        cb.checked = false;
        stepper.classList.remove("visible");
        card.classList.remove("selected");
      }
      updateUI();
    });

    // card click toggles checkbox (but not on stepper buttons)
    card.addEventListener("click", (e) => {
      if (e.target === cb || e.target.closest(".qty-stepper") || e.target.tagName === "LABEL") return;
      cb.checked = !cb.checked;
      cb.dispatchEvent(new Event("change"));
    });
  });

  bubble.addEventListener("click", () => {
    if (totalItems() > 0) overlay.classList.add("open");
  });

  document.getElementById("modal-cancel").addEventListener("click", () => {
    overlay.classList.remove("open");
  });

  document.getElementById("modal-confirm").addEventListener("click", () => {
    const name    = document.getElementById("input-name").value.trim();
    const address = document.getElementById("input-address").value.trim();
    const phone   = document.getElementById("input-phone").value.trim();
    if (!name)    { alert("Please enter your name."); return; }
    if (!address) { alert("Please enter your delivery address."); return; }
    if (!phone)   { alert("Please enter your phone number."); return; }

    // save for next time
    localStorage.setItem("npp_name",    name);
    localStorage.setItem("npp_address", address);
    localStorage.setItem("npp_phone",   phone);

    overlay.classList.remove("open");
    sendWhatsApp(name, address, phone);
  });

  // prefill from localStorage if available
  document.getElementById("input-name").value    = localStorage.getItem("npp_name")    || "";
  document.getElementById("input-address").value = localStorage.getItem("npp_address") || "";
  document.getElementById("input-phone").value   = localStorage.getItem("npp_phone")   || "";

function sendWhatsApp(name, address, phone) {
    const mrpTotal   = totalMRP();
    const saleTotal  = totalSale();
    const saved      = mrpTotal - saleTotal;
    const delivery   = saleTotal >= FREE_DELIVERY_THRESHOLD ? 0 : DELIVERY_CHARGE;
    const finalPrice = saleTotal + delivery;

    const itemLines = products
      .map((p, i) => ({ p, q: qty[i] }))
      .filter(({ q }) => q > 0)
      .map(({ p, q }, idx) => {
        const linePrice = p.sale * q;
        return `${idx + 1}. ${p.name}\n   Qty: ${q} | ₹${linePrice}`;
      }).join("\n\n");

    const deliveryLine = delivery === 0
      ? `Delivery Fee: Free  `
      : `Delivery Fee: \u20B9${delivery}  `;

    const message = 
        `*New Palace Provision Store*\nSector 30C, Chandigarh\n\n`
      + `\u2705 *Order received!*\n\n`
      + `\uD83D\uDED2 *Order Summary*\n\n`
      + itemLines
      + `\n\n------------------------\n`
      + `MRP Total: \u20B9${mrpTotal}  \n`
      + `You saved: -\u20B9${saved}  \n`
      + deliveryLine + `\n\n`
      + `\uD83D\uDCB0 *Final Amount: \u20B9${finalPrice}*\n\n`
      + `\uD83D\uDC64 *Customer Details*\n`
      + `Name: ${name}  \n`
      + `Address: ${address}  \n`
      + `Phone: ${phone}  \n\n`
      + `------------------------\n\n`
      + `We\u2019ll review your order shortly and share a UPI payment QR.\n\n`
      + `\uD83D\uDE9A We try our best to deliver on the same day.`;

    const url = "https://wa.me/" + PHONE + "?text=" + encodeURIComponent(message);
    console.log(url);
    window.location.href = url;
}

  updateUI();
  } // end initApp
</script>
</body>
</html>
