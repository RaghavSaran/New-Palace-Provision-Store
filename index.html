<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>New Palace Provision & General Store</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f5f5f0;
      color: #333;
      padding-bottom: 100px;
    }

    header {
      background: #2e7d32;
      color: white;
      padding: 16px 20px;
      text-align: center;
    }
    header h1 { font-size: 1.4rem; }
    header p  { font-size: 0.85rem; opacity: 0.85; margin-top: 4px; }
    header .store-phone { font-size: 0.9rem; margin-top: 6px; opacity: 1; font-weight: 600; letter-spacing: 0.5px; }

    /* 2-column portrait grid */
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      padding: 16px;
      max-width: 600px;
      margin: 0 auto;
    }

    .card {
      background: white;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      transition: transform 0.15s, box-shadow 0.15s;
      cursor: pointer;
      user-select: none;
      display: flex;
      flex-direction: column;
    }
    .card:hover { transform: translateY(-3px); box-shadow: 0 4px 16px rgba(0,0,0,0.12); }
    .card:active { transform: scale(0.97); }
    .card.selected { outline: 3px solid #2e7d32; }

    .card img {
      width: 100%;
      height: 160px;
      object-fit: cover;
    }

    .card-body {
      padding: 10px 10px 12px;
      display: flex;
      flex-direction: column;
      flex: 1;
    }
    .card-body h3 { font-size: 0.8rem; margin-bottom: 4px; line-height: 1.3; }

    .measurement { font-size: 0.72rem; color: #888; margin-bottom: 6px; }

    .pricing {
      display: flex;
      align-items: center;
      gap: 5px;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }
    .mrp-strike { font-size: 0.75rem; color: #aaa; text-decoration: line-through; }
    .sale-price  { font-size: 0.9rem; color: #2e7d32; font-weight: 700; }

    /* Checkbox row */
    .add-row {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.8rem;
      margin-top: auto;
    }
    .add-row input[type="checkbox"] {
      width: 16px; height: 16px;
      accent-color: #2e7d32;
      cursor: pointer;
      flex-shrink: 0;
    }

    /* Quantity stepper — hidden until checked */
    .qty-stepper {
      display: none;
      align-items: center;
      gap: 0;
      margin-top: 8px;
      border: 1.5px solid #2e7d32;
      border-radius: 8px;
      overflow: hidden;
      width: 100%;
    }
    .qty-stepper.visible { display: flex; }

    .qty-btn {
      background: #2e7d32;
      color: white;
      border: none;
      width: 34px;
      height: 32px;
      font-size: 1.1rem;
      cursor: pointer;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s;
    }
    .qty-btn:hover { background: #1b5e20; }
    .qty-num {
      flex: 1;
      text-align: center;
      font-size: 0.9rem;
      font-weight: 700;
      color: #2e7d32;
    }

    /* Floating cart bubble */
    #cart-bubble {
      position: fixed;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%);
      background: #f9a825;
      color: #333;
      border-radius: 50px;
      padding: 10px 22px;
      text-align: center;
      box-shadow: 0 4px 18px rgba(0,0,0,0.18);
      display: none;
      z-index: 50;
      min-width: 220px;
      transition: background 0.3s, color 0.3s;
    }
    #cart-bubble.free-delivery { background: #2e7d32; color: white; }
    #cart-bubble .bubble-amount { font-size: 1.1rem; font-weight: 700; }
    #cart-bubble .bubble-note   { font-size: 0.75rem; margin-top: 2px; opacity: 0.85; }

    /* Footer */
    .footer {
      text-align: center;
      padding: 12px 24px 24px;
      max-width: 600px;
      margin: 0 auto;
    }
    #selected-count { margin-bottom: 10px; font-size: 0.9rem; color: #555; }

    #checkout-btn {
      background: #25D366;
      color: white;
      border: none;
      padding: 14px 36px;
      font-size: 1rem;
      border-radius: 50px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      box-shadow: 0 4px 14px rgba(37,211,102,0.4);
      transition: background 0.2s, transform 0.15s;
    }
    #checkout-btn:hover { background: #1ebe5d; transform: scale(1.03); }
    #checkout-btn:disabled { background: #aaa; box-shadow: none; cursor: not-allowed; transform: none; }
    #checkout-btn svg { width: 22px; height: 22px; fill: white; }

    /* Modal */
    .modal-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }
    .modal-overlay.open { display: flex; }

    .modal {
      background: white;
      border-radius: 16px;
      padding: 28px 24px;
      width: 90%;
      max-width: 420px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.2);
    }
    .modal h2 { font-size: 1.1rem; margin-bottom: 6px; color: #2e7d32; }
    .modal p  { font-size: 0.85rem; color: #777; margin-bottom: 20px; }

    .modal label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      margin-bottom: 4px;
      color: #444;
    }
    .modal input, .modal textarea {
      width: 100%;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 0.9rem;
      margin-bottom: 14px;
      outline: none;
      transition: border 0.2s;
    }
    .modal input:focus, .modal textarea:focus { border-color: #2e7d32; }
    .modal textarea { resize: vertical; min-height: 70px; }

    .modal-actions { display: flex; gap: 10px; justify-content: flex-end; }
    .btn-cancel {
      background: #eee; border: none; padding: 10px 20px;
      border-radius: 8px; cursor: pointer; font-size: 0.9rem;
    }
    .btn-confirm {
      background: #25D366; color: white; border: none;
      padding: 10px 20px; border-radius: 8px;
      cursor: pointer; font-size: 0.9rem; font-weight: 600;
    }
    .btn-confirm:hover { background: #1ebe5d; }
  </style>
</head>
<body>

<header>
  <h1>🛒 New Palace Provision & General Store</h1>
  <p>Sector 30C, Chandigarh — Order via WhatsApp</p>
  <p class="store-phone">📞 9876364002</p>
</header>

<div class="grid" id="product-grid"></div>

<div class="footer">
  <p id="selected-count">0 items selected</p>
  <button id="checkout-btn" disabled>
    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/>
      <path d="M12 0C5.373 0 0 5.373 0 12c0 2.123.554 4.118 1.528 5.855L0 24l6.335-1.508A11.945 11.945 0 0012 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 21.818a9.818 9.818 0 01-5.006-1.374l-.36-.213-3.76.895.952-3.653-.234-.374A9.818 9.818 0 1112 21.818z"/>
    </svg>
    Proceed to Order
  </button>
</div>

<!-- Floating cart bubble -->
<div id="cart-bubble">
  <div class="bubble-amount" id="bubble-amount">₹0</div>
  <div class="bubble-note"   id="bubble-note"></div>
</div>

<!-- Address / Phone Modal -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <h2>Delivery Details</h2>
    <p>We need your address and phone number so our delivery boy can reach you.</p>

    <label for="input-address">Delivery Address</label>
    <textarea id="input-address" placeholder="House no., Street, Sector, City"></textarea>

    <label for="input-phone">Phone Number</label>
    <input type="tel" id="input-phone" placeholder="e.g. 9876543210" maxlength="10" />

    <div class="modal-actions">
      <button class="btn-cancel" id="modal-cancel">Cancel</button>
      <button class="btn-confirm" id="modal-confirm">Send Order on WhatsApp</button>
    </div>
  </div>
</div>

<script>
  const PHONE = "919168081609";
  const FREE_DELIVERY_THRESHOLD = 500;
  const DELIVERY_CHARGE = 50;

  const products = [
    { id: 1, ext: "avif", name: "Whole Farm Grocery Makhana",                                          mrp: 210, sale: 119, grams: 100 },
    { id: 2, ext: "png",  name: "Oral-B Cavity Defense Bacterial Fighter Toothbrush (Soft - Pack of 6)", mrp: 120, sale: 111, pcs: 6 },
    { id: 3, ext: "avif", name: "Mamaearth Vitamin C Face Wash",                                        mrp: 125, sale: 125, ml: 50 },
    { id: 4, ext: "png",  name: "Pril Tamarind Shine Specialist Dishwash Gel",                          mrp: 225, sale: 198, ml: 750 },
    { id: 5, ext: "png",  name: "Nestle KitKat 4F Choco Wafer Chocolate",                               mrp: 30,  sale: 30,  grams: 38.5 },
    { id: 6, ext: "png",  name: "Teddyy Pant Style Baby Diaper",                                        mrp: 949, sale: 464, pcs: 74 },
  ];

  // qty[i] = quantity selected for product i (0 = not in cart)
  const qty = new Array(products.length).fill(0);

  function getMeasurement(p) {
    if (p.grams) return `${p.grams}gm`;
    if (p.ml)    return `${p.ml}ml`;
    if (p.pcs)   return `${p.pcs} pcs`;
    return "";
  }

  function totalSale() { return products.reduce((s, p, i) => s + p.sale * qty[i], 0); }
  function totalMRP()  { return products.reduce((s, p, i) => s + p.mrp  * qty[i], 0); }
  function totalItems(){ return qty.reduce((s, q) => s + q, 0); }

  const grid      = document.getElementById("product-grid");
  const btn       = document.getElementById("checkout-btn");
  const countEl   = document.getElementById("selected-count");
  const bubble    = document.getElementById("cart-bubble");
  const bubbleAmt = document.getElementById("bubble-amount");
  const bubbleNote= document.getElementById("bubble-note");
  const overlay   = document.getElementById("modal-overlay");

  function updateUI() {
    const n    = totalItems();
    const sale = totalSale();

    countEl.textContent = `${n} item${n !== 1 ? "s" : ""} in cart`;
    btn.disabled = n === 0;

    // floating bubble
    if (n === 0) {
      bubble.style.display = "none";
    } else {
      bubble.style.display = "block";
      bubbleAmt.textContent = `₹${sale}`;
      if (sale >= FREE_DELIVERY_THRESHOLD) {
        bubble.classList.add("free-delivery");
        bubbleNote.textContent = "Free delivery >₹500 !!!";
      } else {
        bubble.classList.remove("free-delivery");
        bubbleNote.textContent = `+ delivery charges (below ₹500)`;
      }
    }
  }

  // Build cards
  products.forEach((p, i) => {
    const hasSale = p.sale < p.mrp;
    const m = getMeasurement(p);

    const card = document.createElement("div");
    card.className = "card";
    card.innerHTML = `
      <img src="Item images/${p.id}.${p.ext}" alt="${p.name}" loading="lazy" />
      <div class="card-body">
        <h3>${p.name}</h3>
        ${m ? `<div class="measurement">${m}</div>` : ""}
        <div class="pricing">
          ${hasSale ? `<span class="mrp-strike">₹${p.mrp}</span>` : ""}
          <span class="sale-price">₹${p.sale}</span>
        </div>
        <div class="add-row">
          <input type="checkbox" id="cb-${i}" />
          <label for="cb-${i}" style="cursor:pointer;font-size:0.8rem;">Add to order</label>
        </div>
        <div class="qty-stepper" id="stepper-${i}">
          <button class="qty-btn" id="minus-${i}">−</button>
          <span class="qty-num" id="qnum-${i}">1</span>
          <button class="qty-btn" id="plus-${i}">+</button>
        </div>
      </div>
    `;

    grid.appendChild(card);

    const cb      = document.getElementById(`cb-${i}`);
    const stepper = document.getElementById(`stepper-${i}`);
    const qnum    = document.getElementById(`qnum-${i}`);
    const minusBtn= document.getElementById(`minus-${i}`);
    const plusBtn = document.getElementById(`plus-${i}`);

    cb.addEventListener("change", () => {
      if (cb.checked) {
        qty[i] = 1;
        qnum.textContent = 1;
        stepper.classList.add("visible");
        card.classList.add("selected");
      } else {
        qty[i] = 0;
        stepper.classList.remove("visible");
        card.classList.remove("selected");
      }
      updateUI();
    });

    plusBtn.addEventListener("click", (e) => {
      e.stopPropagation();
      qty[i]++;
      qnum.textContent = qty[i];
      updateUI();
    });

    minusBtn.addEventListener("click", (e) => {
      e.stopPropagation();
      if (qty[i] > 1) {
        qty[i]--;
        qnum.textContent = qty[i];
      } else {
        // deselect
        qty[i] = 0;
        cb.checked = false;
        stepper.classList.remove("visible");
        card.classList.remove("selected");
      }
      updateUI();
    });

    // card click toggles checkbox (but not on stepper buttons)
    card.addEventListener("click", (e) => {
      if (e.target === cb || e.target.closest(".qty-stepper") || e.target.tagName === "LABEL") return;
      cb.checked = !cb.checked;
      cb.dispatchEvent(new Event("change"));
    });
  });

  btn.addEventListener("click", () => overlay.classList.add("open"));

  document.getElementById("modal-cancel").addEventListener("click", () => {
    overlay.classList.remove("open");
  });

  document.getElementById("modal-confirm").addEventListener("click", () => {
    const address = document.getElementById("input-address").value.trim();
    const phone   = document.getElementById("input-phone").value.trim();
    if (!address) { alert("Please enter your delivery address."); return; }
    if (!phone)   { alert("Please enter your phone number."); return; }
    overlay.classList.remove("open");
    sendWhatsApp(address, phone);
  });

  function sendWhatsApp(address, phone) {
    const mrpTotal  = totalMRP();
    const saleTotal = totalSale();
    const discount  = mrpTotal - saleTotal;
    const delivery  = saleTotal >= FREE_DELIVERY_THRESHOLD ? 0 : DELIVERY_CHARGE;
    const finalPrice= saleTotal + delivery;

    const itemLines = products
      .map((p, i) => ({ p, q: qty[i] }))
      .filter(({ q }) => q > 0)
      .map(({ p, q }, idx) => {
        const m = getMeasurement(p);
        const linePrice = p.sale * q;
        return `${idx + 1}. ${p.name}${m ? ", " + m : ""}${q > 1 ? " x" + q : ""} : ₹${linePrice}`;
      }).join("\n");

    const deliveryLine = delivery === 0 ? `Delivery fees : Free` : `Delivery fees : ₹${delivery}`;

    const message =
`Thanks for ordering from New Palace Provision Store, Sector 30C, Chandigarh!!

Items added by you:

${itemLines}

MRP price : ₹${mrpTotal}
Discounts : -₹${discount}
${deliveryLine}

Final price : ₹${finalPrice}

Your address: ${address}
Your phone number: ${phone}

The store will review the order and if accepted, will soon share a QR code for the UPI Payment. Thanks!`;

    window.open(`https://wa.me/${PHONE}?text=${encodeURIComponent(message)}`, "_blank");
  }

  updateUI();
</script>
</body>
</html>
